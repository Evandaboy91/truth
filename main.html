<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>truth · HermesSup</title>
  <meta name="description" content="truth: a facts interface for HermesSup + FactoSupero" />
  <style>
    :root{
      --bg:#070b12;
      --panel:#0c1424;
      --panel2:#0d1830;
      --border:#1a2b4a;
      --text:#e6eefc;
      --muted:#9cb3d6;
      --faint:#6f88ad;
      --good:#2fd08f;
      --bad:#ff5f7a;
      --warn:#ffcb3c;
      --accent:#7fb0ff;
      --accent2:#b78bff;
      --chip:#101f38;
      --chip2:#122745;
      --shadow: 0 20px 60px rgba(0,0,0,0.5);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1000px 600px at 20% -10%, rgba(127,176,255,0.23), transparent 55%),
                  radial-gradient(900px 700px at 90% 0%, rgba(183,139,255,0.17), transparent 58%),
                  radial-gradient(900px 700px at 70% 110%, rgba(47,208,143,0.12), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    a{color:var(--accent); text-decoration:none}
    a:hover{text-decoration:underline}
    header{
      position:sticky; top:0; z-index:10;
      background: rgba(7,11,18,0.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26,43,74,0.75);
    }
    .wrap{max-width:1180px; margin:0 auto; padding:16px 18px;}
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:14px;
    }
    .brand{display:flex; align-items:flex-start; gap:12px}
    .logo{
      width:38px; height:38px; border-radius:14px;
      background: linear-gradient(135deg, rgba(127,176,255,0.95), rgba(183,139,255,0.9));
      box-shadow: 0 10px 35px rgba(127,176,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
    }
    .brand h1{margin:0; font-size:16px; letter-spacing:0.5px}
    .brand .sub{margin-top:4px; color:var(--muted); font-size:12px; line-height:1.25}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .btn{
      cursor:pointer;
      border:1px solid rgba(39,64,108,0.95);
      background: linear-gradient(180deg, rgba(18,37,64,0.92), rgba(12,20,36,0.96));
      color:var(--text);
      padding:9px 12px;
      border-radius: 14px;
      font-weight:600;
      letter-spacing:0.2px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      transition: transform .06s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .btn:hover{background: linear-gradient(180deg, rgba(23,49,84,0.95), rgba(12,20,36,0.96)); border-color: rgba(127,176,255,0.55)}
    .btn:active{transform: translateY(1px)}
    .btn.ghost{background: transparent; box-shadow:none}
    .btn.good{border-color: rgba(47,208,143,0.55)}
    .btn.bad{border-color: rgba(255,95,122,0.6)}
    .pill{
      display:inline-flex; gap:7px; align-items:center;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(26,43,74,0.9);
      background: rgba(16,31,56,0.72);
      color: var(--muted);
      font-size:12px;
      max-width:100%;
    }
    .pill strong{color:#cfe1ff; font-weight:650}
    .mono{font-family:var(--mono)}
    .grid{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }
    .card{
      background: linear-gradient(180deg, rgba(12,20,36,0.92), rgba(9,14,24,0.92));
      border:1px solid rgba(26,43,74,0.95);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding: 14px 14px 10px 14px;
      border-bottom:1px solid rgba(26,43,74,0.85);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .card .hd h2{margin:0; font-size:13px; letter-spacing:0.45px; text-transform:uppercase; color:#cfe1ff}
    .card .bd{padding: 14px}
    .field{display:flex; flex-direction:column; gap:6px; margin: 10px 0}
    label{font-size:12px; color: var(--muted)}
    input, textarea, select{
      border:1px solid rgba(26,43,74,0.92);
      background: rgba(10,18,33,0.92);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 11px;
      outline:none;
      font-size:13px;
    }
    textarea{min-height: 120px; resize: vertical; line-height:1.3}
    input:focus, textarea:focus, select:focus{border-color: rgba(127,176,255,0.7)}
    .hint{font-size:12px; color: var(--faint); line-height:1.25}
    .sep{height:1px; background: rgba(26,43,74,0.6); margin: 12px 0}
    .facts{display:flex; flex-direction:column; gap:10px}
    .fact{
      border:1px solid rgba(26,43,74,0.75);
      background: rgba(12,20,36,0.62);
      border-radius: 16px;
      padding: 12px;
    }
    .fact .meta{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between}
    .fact .meta .left{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .fact .meta .right{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .chip{
      display:inline-flex; align-items:center; gap:7px;
      padding: 5px 9px; border-radius: 999px;
      border: 1px solid rgba(26,43,74,0.85);
      background: rgba(16,31,56,0.8);
      font-size:12px;
      color: var(--muted);
      max-width: 100%;
    }
    .chip .k{color:#cfe1ff; font-weight:650}
    .chip.good{border-color: rgba(47,208,143,0.4)}
    .chip.warn{border-color: rgba(255,203,60,0.45)}
    .chip.bad{border-color: rgba(255,95,122,0.4)}
    .fact pre{
      margin:10px 0 0 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(10,18,33,0.92);
      border: 1px solid rgba(26,43,74,0.75);
      overflow:auto;
      font-family: var(--mono);
      font-size: 12px;
      color:#cfe1ff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .toast{
      position:fixed; right: 16px; bottom: 16px;
      background: rgba(12,20,36,0.92);
      border:1px solid rgba(26,43,74,0.92);
      border-radius: 16px;
      padding: 10px 12px;
      max-width: 420px;
      box-shadow: var(--shadow);
      display:none;
    }
    .toast .t{font-weight:650; margin-bottom:4px}
    .toast .m{color: var(--muted); font-size:12px; line-height:1.25}
    .toast.good{border-color: rgba(47,208,143,0.55)}
    .toast.bad{border-color: rgba(255,95,122,0.55)}
    .toast.warn{border-color: rgba(255,203,60,0.55)}
    .kpi{
      display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px;
    }
    .kpi .box{
      border:1px solid rgba(26,43,74,0.85);
      background: rgba(16,31,56,0.62);
      border-radius: 16px;
      padding: 10px 12px;
    }
    .kpi .box .n{font-size:18px; font-weight:750; letter-spacing:0.2px}
    .kpi .box .l{font-size:12px; color: var(--muted)}
